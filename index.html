<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPGT Product Data</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0f12;
  --surface: #161a1f;
  --surface2: #1d2229;
  --border: rgba(255,255,255,0.07);
  --border-hover: rgba(255,255,255,0.14);
  --text: #f0f2f5;
  --text-muted: #7a8494;
  --text-dim: #4a5260;
  --accent: #e8b84b;
  --accent-dim: rgba(232,184,75,0.1);
  --accent-border: rgba(232,184,75,0.28);
  --green: #4ade80;
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.08);
  --radius: 10px;
  --radius-sm: 6px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ── */
.site-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
}

.logo-dot {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--accent);
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 4px 12px;
  border-radius: 99px;
}

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-dim);
  transition: background 0.3s, box-shadow 0.3s;
}
.status-dot.live    { background: var(--green); box-shadow: 0 0 6px var(--green); }
.status-dot.error   { background: var(--red); }
.status-dot.loading { background: var(--accent); animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── Layout ── */
.main { max-width: 1200px; margin: 0 auto; padding: 2rem 2rem 3rem; }

/* ── Tabs ── */
.dataset-tabs { display: flex; gap: 8px; margin-bottom: 1.75rem; flex-wrap: wrap; }

.tab-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.tab-btn:hover { border-color: var(--border-hover); color: var(--text); }
.tab-btn.active { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }

.tab-format {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  padding: 1px 6px;
  border-radius: 4px;
  background: rgba(255,255,255,0.06);
  color: var(--text-dim);
}
.tab-btn.active .tab-format { background: var(--accent-dim); color: var(--accent); }

/* ── Section header ── */
.section-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 1.25rem;
  gap: 12px;
  flex-wrap: wrap;
}

.section-title { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
.section-desc  { font-size: 13px; color: var(--text-muted); margin-top: 3px; line-height: 1.5; }

.section-meta { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

.meta-tag {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  padding: 3px 9px;
  border-radius: var(--radius-sm);
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
}

.raw-link {
  font-size: 12px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  text-decoration: none;
  transition: all 0.15s;
}
.raw-link:hover { border-color: var(--border-hover); color: var(--text); }

/* ── Product table ── */
.product-table {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.product-table-head {
  display: grid;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
}

.product-table-head span {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* Row layout: image | name+desc | extra columns */
.product-row {
  display: grid;
  align-items: center;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
  min-height: 88px;
}
.product-row:last-child { border-bottom: none; }
.product-row:hover { background: var(--surface2); }

/* image cell */
.cell-image {
  padding: 10px 12px 10px 16px;
  display: flex;
  align-items: center;
}

.product-img {
  width: 100px;
  height: 66px;
  object-fit: cover;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  display: block;
  flex-shrink: 0;
}

.img-placeholder {
  width: 100px;
  height: 66px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.img-placeholder svg { opacity: 0.25; }

/* name + description cell */
.cell-info {
  padding: 12px 16px 12px 0;
}

.product-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.product-desc {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* extra columns */
.cell-extra {
  padding: 10px 16px 10px 0;
  font-size: 12px;
  color: var(--text-muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.cell-extra.numeric {
  font-family: 'DM Mono', monospace;
  color: var(--text);
  text-align: right;
  padding-right: 20px;
}

.col-label {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 3px;
}

/* table footer */
.table-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg);
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: var(--text-dim);
  gap: 12px;
}
.table-footer span:first-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── States ── */
.state-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 5rem 2rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-muted);
  font-size: 13px;
  text-align: center;
}

.spinner {
  width: 22px; height: 22px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-box {
  padding: 12px 16px;
  background: var(--red-dim);
  border: 1px solid rgba(248,113,113,0.2);
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--red);
  margin-bottom: 1.25rem;
}

/* ── Footer ── */
.site-footer {
  text-align: center;
  padding: 1.5rem 2rem;
  font-size: 12px;
  color: var(--text-dim);
  font-family: 'DM Mono', monospace;
  border-top: 1px solid var(--border);
  margin-top: 2rem;
}
.site-footer a { color: var(--accent); text-decoration: none; }
.site-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo">
    <div class="logo-dot"></div>
    GPGT Product Data
  </div>
  <div class="status-pill">
    <div class="status-dot loading" id="status-dot"></div>
    <span id="status-text">Loading...</span>
  </div>
</header>

<main class="main">
  <div id="error-banner"></div>
  <div class="dataset-tabs" id="tabs"></div>
  <div id="content"></div>
</main>

<footer class="site-footer">
  <a href="https://github.com/GrandToursTravel/gpgt-product-data" target="_blank">github.com/GrandToursTravel/gpgt-product-data</a>
</footer>

<script>
const INDEX_URL = "https://raw.githubusercontent.com/GrandToursTravel/gpgt-product-data/main/index.json";

let datasets = [];
let activeId = null;
let cache = {};

function setStatus(state, text) {
  document.getElementById("status-dot").className = "status-dot " + state;
  document.getElementById("status-text").textContent = text;
}

function fixUrl(url, file) {
  if (!url || !url.includes("/main/")) {
    return "https://raw.githubusercontent.com/GrandToursTravel/gpgt-product-data/main/" + file;
  }
  return url;
}

function esc(str) {
  return String(str ?? "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function isNumeric(str) {
  if (!str) return false;
  return !isNaN(str.replace(/[$£€,\s%]/g,"")) && str.replace(/[$£€,\s%]/g,"") !== "";
}

function looksLikeUrl(str) {
  return /^https?:\/\/.+/i.test(str.trim());
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(",").map(h => h.replace(/^"|"$/g,"").trim());
  const rows = lines.slice(1).map(line => {
    const cols = [];
    let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    return cols;
  }).filter(r => r.some(c => c !== ""));
  return { headers, rows };
}

function renderTabs() {
  document.getElementById("tabs").innerHTML = datasets.map(ds => `
    <button class="tab-btn ${ds.id === activeId ? "active" : ""}" onclick="switchTab('${esc(ds.id)}')">
      ${esc(ds.name)}
      <span class="tab-format">${esc(ds.format.toUpperCase())}</span>
    </button>
  `).join("");
}

function renderProducts(ds, headers, rows) {
  const rawUrl = fixUrl(ds.url, ds.file);

  // columns: 0=name, 1=description, 2=image url, 3+=extra
  const nameCol  = 0;
  const descCol  = 1;
  const imgCol   = 2;
  const extraCols = headers.slice(3);

  // Build grid template: image(120px) | info(1fr) | one col per extra(auto)
  const extraColsDef = extraCols.map(() => "minmax(100px, 160px)").join(" ");
  const gridCols = `120px 1fr${extraCols.length ? " " + extraColsDef : ""}`;

  const headerCells = [
    `<span></span>`,
    `<span>${esc(headers[nameCol] || "Name")}</span>`,
    ...extraCols.map(h => `<span>${esc(h)}</span>`)
  ].join("");

  const rowsHtml = rows.map(row => {
    const name  = row[nameCol] || "";
    const desc  = row[descCol] || "";
    const imgSrc = row[imgCol] || "";
    const extras = extraCols.map((h, i) => row[3 + i] || "");

    const imgCell = imgSrc && looksLikeUrl(imgSrc)
      ? `<img class="product-img" src="${esc(imgSrc)}" alt="${esc(name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : "";

    const placeholder = `
      <div class="img-placeholder" style="${imgSrc && looksLikeUrl(imgSrc) ? 'display:none' : ''}">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>`;

    const extraCells = extras.map((val, i) => {
      const num = isNumeric(val);
      return `<div class="cell-extra ${num ? "numeric" : ""}">
        <div class="col-label">${esc(extraCols[i])}</div>
        <div>${esc(val)}</div>
      </div>`;
    }).join("");

    return `
      <div class="product-row" style="grid-template-columns:${gridCols}">
        <div class="cell-image">${imgCell}${placeholder}</div>
        <div class="cell-info">
          <div class="product-name" title="${esc(name)}">${esc(name)}</div>
          <div class="product-desc">${esc(desc)}</div>
        </div>
        ${extraCells}
      </div>`;
  }).join("");

  const headStyle = `grid-template-columns:${gridCols}`;

  document.getElementById("content").innerHTML = `
    <div class="section-header">
      <div>
        <div class="section-title">${esc(ds.name)}</div>
        <div class="section-desc">${esc(ds.description)}</div>
      </div>
      <div class="section-meta">
        <span class="meta-tag">${rows.length} rows</span>
        <span class="meta-tag">${headers.length} cols</span>
        <a class="raw-link" href="${rawUrl}" target="_blank">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          Raw CSV
        </a>
      </div>
    </div>
    <div class="product-table">
      <div class="product-table-head" style="${headStyle}">
        ${headerCells}
      </div>
      ${rowsHtml}
      <div class="table-footer">
        <span>${esc(rawUrl)}</span>
        <span>${rows.length} records</span>
      </div>
    </div>`;
}

async function switchTab(id) {
  if (activeId === id) return;
  activeId = id;
  renderTabs();

  const ds = datasets.find(d => d.id === id);
  if (!ds) return;

  if (cache[id]) {
    renderProducts(ds, cache[id].headers, cache[id].rows);
    setStatus("live", datasets.length + " datasets");
    return;
  }

  document.getElementById("content").innerHTML = `
    <div class="state-box">
      <div class="spinner"></div>
      <span>Loading ${esc(ds.name)}...</span>
    </div>`;
  setStatus("loading", "Loading...");

  const url = fixUrl(ds.url, ds.file);
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const { headers, rows } = parseCSV(text);
    cache[id] = { headers, rows };
    renderProducts(ds, headers, rows);
    setStatus("live", datasets.length + " datasets");
  } catch (e) {
    document.getElementById("content").innerHTML = `
      <div class="state-box">
        <span>⚠ Could not load data: ${esc(e.message)}</span>
        <span style="font-size:11px;color:var(--text-dim)">${esc(url)}</span>
      </div>`;
    setStatus("error", "Load failed");
  }
}

async function init() {
  setStatus("loading", "Loading...");
  try {
    const res = await fetch(INDEX_URL);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    datasets = data.datasets;
    const defaultDs = datasets.find(d => d.id === "singapore-tickets") || datasets[0];
    activeId = defaultDs?.id;
    renderTabs();
    if (activeId) await switchTab(activeId);
  } catch (e) {
    setStatus("error", "Failed");
    document.getElementById("error-banner").innerHTML =
      `<div class="error-box">⚠ Could not load index.json: ${esc(e.message)}</div>`;
  }
}

init();
</script>
</body>
</html>
